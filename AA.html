<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium English - Thai Flashcards</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Sarabun:wght@400;600&display=swap');

        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e1136 0%, #0b0616 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-accent-border: rgba(236, 72, 153, 0.2);
            
            --text-neon: #ffffff;
            --text-muted: #94a3b8;
            
            /* T.RICKS Palette */
            --primary-glow: #ec4899; /* Pink */
            --secondary-glow: #8b5cf6; /* Purple */
            --spark-yellow: #eab308; /* Yellow Spark */
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-neon);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        /* --- Decorative Background Glows --- */
        .bg-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--secondary-glow);
            filter: blur(150px);
            opacity: 0.15;
            top: -100px;
            right: -50px;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header Styling --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Spark Icon Decorator */
        .sparkle {
            color: var(--spark-yellow);
            display: inline-block;
            font-size: 1.8rem;
            animation: pulse 2s infinite;
        }

        /* --- Premium UI Buttons --- */
        .btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .btn-action:hover {
            background: white;
            color: #0b0616;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
            border-color: white;
        }

        .btn-action svg {
            stroke: currentColor;
            fill: none;
        }

        /* --- Page 1: Dashboard Word Grid --- */
        #dashboard-page {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .word-row {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        .word-row::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, transparent, rgba(236, 72, 153, 0.05));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .word-row:hover {
            transform: translateY(-5px);
            border-color: var(--glass-accent-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .word-row:hover::before {
            opacity: 1;
        }

        .word-row .en {
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .word-row .th {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- Page 2: Glassmorphism Flashcard View --- */
        #card-page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .flashcard-wrapper {
            perspective: 1200px;
            width: 100%;
            max-width: 500px;
            height: 320px;
            margin: 0 auto 30px auto;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            padding: 40px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Card background abstract blur shape (Like T.Ricks) */
        .card-face::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            filter: blur(50px);
            opacity: 0.2;
            bottom: -30px;
            right: -30px;
            border-radius: 50%;
            z-index: -1;
        }

        .card-front h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .card-front span {
            font-size: 0.8rem;
            color: var(--primary-glow);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .card-back {
            transform: rotateY(180deg);
            border-color: var(--glass-accent-border);
        }

        .card-back h2 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0;
            text-align: center;
            color: #f472b6;
            line-height: 1.4;
        }

        /* --- Control Interface --- */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-top: 40px;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-muted);
            transform: scale(1.05);
        }

        .progress-indicator {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            background: rgba(0,0,0,0.2);
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* --- Utility classes --- */
        .back-btn-wrapper {
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div class="bg-glow-1"></div>

<div class="container">
    <header>
        <h1><span class="sparkle">✦</span> VOCABULARY WIZARDRY</h1>
    </header>

    <div id="dashboard-page">
        <div class="btn-container">
            <button class="btn-action" onclick="startFlashcards()">
                <span>START FLASHCARDS</span>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
        <div class="word-grid" id="wordGrid"></div>
    </div>

    <div id="card-page">
        <div class="back-btn-wrapper">
            <button class="btn-action" style="padding: 10px 20px; font-size: 0.9rem;" onclick="showDashboard()">
                <svg width="16" height="16" viewBox="0 0 24 24" style="transform: rotate(180deg);"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Back to List</span>
            </button>
        </div>
        
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <h2 id="frontText">Word</h2>
                    <span>TAP TO REVEAL</span>
                </div>
                <div class="card-face card-back">
                    <h2 id="backText">คำแปลภาษาไทย</h2>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-nav" onclick="prevCard(event)">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="progress-indicator" id="progressText">1 / 45</span>
            <button class="btn-nav" onclick="nextCard(event)">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const vocabData = [
        { en: "categorically", th: "อย่างเด็ดขาด / อย่างแยกประเภทชัดเจน" },
        { en: "devise", th: "คิดค้น / วางแผน" },
        { en: "elated", th: "ปิติตื่นเต้น / ดีใจซะเหลือเกิน" },
        { en: "endure", th: "อดทน / คงอยู่" },
        { en: "exploit", th: "แสวงหาผลประโยชน์ / เอาเปรียบ" },
        { en: "happen to", th: "บังเอิญเกิดขึ้น" },
        { en: "inscription", th: "คำจารึก / ข้อความที่สลักไว้" },
        { en: "ironically", th: "อย่างประชดประชัน / อย่างน่าตลกกลับตาลปัตร" },
        { en: "outlawed", th: "ผิดกฎหมาย / ถูกแบน" },
        { en: "onwards", th: "ต่อไปข้างหน้า / ตั้งแต่บัดนั้นเป็นต้นไป" },
        { en: "prior to", th: "ก่อนหน้าที่จะ..." },
        { en: "resolutely", th: "อย่างแน่วแน่ / อย่างเด็ดเดี่ยว" },
        { en: "stave off", th: "ปัดเป่าออกไป / ชะลอสิ่งไม่ดีออกไปก่อน" },
        { en: "supposedly", th: "ตามที่ทึกทักกัน / น่าจะ (แต่ไม่ชัวร์)" },
        { en: "testimony", th: "คำให้การ / หลักฐานพยาน" },
        { en: "clamour", th: "เรียกร้องเสียงดัง / ส่งเสียงเซ็งแซ่" },
        { en: "compel", th: "บังคับ / ผลักดันให้ต้องทำ" },
        { en: "conspiratorial", th: "ลึกลับเหมือนกำลังร่วมกันวางแผนลับ" },
        { en: "dubiety", th: "ความคลุมเครือ / ความน่าสงสัย" },
        { en: "ebullience", th: "ความเบิกบานกระปรี้กระเปร่า" },
        { en: "exasperation", th: "ความฉุนเฉียว / ความหงุดหงิดสุดขีด" },
        { en: "grave", th: "ร้ายแรง / เคร่งเครียด (หรือ หลุมศพ)" },
        { en: "induce", th: "เหนี่ยวนำ / โน้มน้าว" },
        { en: "lose his thread", th: "พูดๆ อยู่แล้วลืมประเด็น / หลงหัวข้อ" },
        { en: "martyred", th: "ยอมสละชีวิตเพื่ออุดมการณ์ / ทรมาน" },
        { en: "scar", th: "แผลเป็น" },
        { en: "scornfully", th: "อย่างดูถูกเหยียดหยาม" },
        { en: "smirk", th: "ยิ้มเยาะ / ยิ้มแบบแสแสร้ง" },
        { en: "stir", th: "คนให้เข้ากัน / ก่อให้เกิดความเคลื่อนไหว" },
        { en: "ungraspable", th: "ยากที่จะเข้าใจจับต้องได้ / คว้าไม่พ้น" },
        { en: "assembly line", th: "สายพานการผลิต (ในโรงงาน)" },
        { en: "endorsements", th: "การรับรอง / การเซ็นชื่อสลักหลัง" },
        { en: "catapult", th: "เครื่องยิงศิลา / ดีดหรือเหวี่ยงออกไปอย่างรวดเร็ว" },
        { en: "feud", th: "ความบาดหมางแบบฝังลึกระยะยาว" },
        { en: "catch on", th: "กลายเป็นที่นิยม / เริ่มเข้าใจแจ่มแจ้ง" },
        { en: "cobbler", th: "ช่างซ่อมรองเท้า" },
        { en: "resent", th: "ขุ่นเคือง / ไม่พอใจ" },
        { en: "franchise", th: "สิทธิ์หรือธุรกิจแฟรนไชส์" },
        { en: "obviate", th: "ขจัดความจำเป็นออกไป / ทำให้หมดปัญหา" },
        { en: "consumed", th: "ถูกกลืนกิน / ถูกบริโภคจนหมดสิ้น" },
        { en: "pioneer", th: "ผู้บุกเบิก" },
        { en: "thriving", th: "เจริญรุ่งเรือง / เติบโตงอกงามอย่างดี" },
        { en: "trademark", th: "เครื่องหมายการค้า / เอกลักษณ์ประจำตัว" },
        { en: "outbid", th: "เสนอราคาประมูลสูงกว่าคนอื่น" },
        { en: "unrivalled", th: "หาตัวจับยาก / ไร้คู่แข่งเทียมทาน" }
    ];

    let currentIndex = 0;

    function initDashboard() {
        const grid = document.getElementById('wordGrid');
        grid.innerHTML = '';
        vocabData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'word-row';
            div.innerHTML = `<div class="en">${item.en}</div><div class="th">${item.th}</div>`;
            grid.appendChild(div);
        });
    }

    function showDashboard() {
        document.getElementById('dashboard-page').style.display = 'block';
        document.getElementById('card-page').style.display = 'none';
    }

    function startFlashcards() {
        document.getElementById('dashboard-page').style.display = 'none';
        document.getElementById('card-page').style.display = 'block';
        currentIndex = 0;
        updateCard();
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function updateCard() {
        document.getElementById('card').classList.remove('flipped');
        setTimeout(() => {
            document.getElementById('frontText').innerText = vocabData[currentIndex].en;
            document.getElementById('backText').innerText = vocabData[currentIndex].th;
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${vocabData.length}`;
        }, 200);
    }

    function nextCard(event) {
        event.stopPropagation();
        currentIndex = (currentIndex + 1) % vocabData.length;
        updateCard();
    }

    function prevCard(event) {
        event.stopPropagation();
        currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length;
        updateCard();
    }

    initDashboard();
</script>

</body>
</html>
